services:
  mysql:
    image: mysql:8.0
    container_name: mysql_invest_db
    environment:
      MYSQL_ROOT_PASSWORD: ${INVEST_DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${INVEST_DB_NAME:-invest}
      MYSQL_USER: ${INVEST_DB_APP_USER:-appuser}
      MYSQL_PASSWORD: ${INVEST_DB_APP_PASSWORD:-apppassword}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - invest_mysql_data:/var/lib/mysql
      - ./database/invest/infra/00_create_invest_db_and_user.sql:/docker-entrypoint-initdb.d/01-invest-infra.sql:ro
      - ./database/invest/migrations/schema/01_create_invest_step1.sql:/docker-entrypoint-initdb.d/02-invest-schema-step1.sql:ro
      - ./database/invest/migrations/schema/02_create_invest_step2_risk.sql:/docker-entrypoint-initdb.d/03-invest-schema-step2-risk.sql:ro
      - ./database/invest/migrations/schema/03_create_invest_acl.sql:/docker-entrypoint-initdb.d/04-invest-schema-acl.sql:ro
      - ./database/invest/migrations/schema/04_create_invest_step3_report.sql:/docker-entrypoint-initdb.d/05-invest-schema-step3-report.sql:ro
      - ./database/invest/migrations/schema/05_create_invest_step4_alert.sql:/docker-entrypoint-initdb.d/06-invest-schema-step4-alert.sql:ro
      - ./database/invest/migrations/schema/06_create_invest_v2_phase1_price_update.sql:/docker-entrypoint-initdb.d/07-invest-schema-v2-phase1-price-update.sql:ro
      - ./database/invest/migrations/schema/07_create_invest_v2_phase1_2_price_update.sql:/docker-entrypoint-initdb.d/08-invest-schema-v2-phase1-2-price-update.sql:ro
      - ./database/invest/migrations/seed-baseline/01_seed_risk_rules.sql:/docker-entrypoint-initdb.d/09-invest-seed-baseline-risk-rules.sql:ro
      - ./database/invest/migrations/seed-baseline/02_seed_acl.sql:/docker-entrypoint-initdb.d/10-invest-seed-baseline-acl.sql:ro
      - ./database/invest/migrations/seed-baseline/03_hide_invest_risk_results_menu.sql:/docker-entrypoint-initdb.d/11-invest-seed-baseline-menu-fix.sql:ro
      - ./database/invest/migrations/seed-baseline/04_set_admin_password_baseline.sql:/docker-entrypoint-initdb.d/12-invest-seed-baseline-admin-password.sql:ro
      - ./database/invest/migrations/seed-baseline/05_seed_system_menu_permission.sql:/docker-entrypoint-initdb.d/13-invest-seed-system-menu-permission.sql:ro
      - ./database/invest/migrations/seed-baseline/06_seed_step3_report_acl.sql:/docker-entrypoint-initdb.d/14-invest-seed-step3-report-acl.sql:ro
      - ./database/invest/migrations/seed-baseline/07_seed_step4_alert_acl.sql:/docker-entrypoint-initdb.d/15-invest-seed-step4-alert-acl.sql:ro
      - ./database/invest/migrations/seed-baseline/08_seed_v2_phase1_price_update_acl.sql:/docker-entrypoint-initdb.d/16-invest-seed-v2-phase1-price-update-acl.sql:ro
      # demo seed 預設不啟用（正式環境不可混入）
      # - ./database/invest/migrations/seed-demo/01_seed_step1_demo_data.sql:/docker-entrypoint-initdb.d/17-invest-seed-demo-step1.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend-invest:
    build:
      context: .
      dockerfile: ./backend/invest/Dockerfile
    container_name: backend_invest
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_DOMAIN: invest
      TZ: ${TZ:-Asia/Taipei}
      SPRING_INVEST_DATASOURCE_URL: ${INVEST_JDBC_URL:-jdbc:mysql://mysql:3306/invest?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&useUnicode=true}
      SPRING_INVEST_DATASOURCE_USERNAME: ${INVEST_DB_APP_USER:-appuser}
      SPRING_INVEST_DATASOURCE_PASSWORD: ${INVEST_DB_APP_PASSWORD:-apppassword}
      SPRING_INVEST_DATASOURCE_DRIVER_CLASS_NAME: ${INVEST_JDBC_DRIVER_CLASS_NAME:-com.mysql.cj.jdbc.Driver}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      INVEST_JWT_SECRET: ${INVEST_JWT_SECRET:-F/cPluFKK3/44X5iX9GdY6P7Ye+BIDdBTw6uljBTl9o=}
      INVEST_JWT_ACCESS_TOKEN_EXPIRATION: ${INVEST_JWT_ACCESS_TOKEN_EXPIRATION:-3600000}
      INVEST_JWT_REFRESH_TOKEN_ENABLED: ${INVEST_JWT_REFRESH_TOKEN_ENABLED:-true}
      INVEST_JWT_REFRESH_TOKEN_EXPIRATION: ${INVEST_JWT_REFRESH_TOKEN_EXPIRATION:-604800000}
      INVEST_CORS_ALLOWED_ORIGIN_PATTERNS: ${INVEST_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost,http://localhost:80,https://localhost,https://localhost:80,http://127.0.0.1,http://127.0.0.1:80,https://power-light-church.duckdns.org,http://power-light-church.duckdns.org,https://38.54.89.136,http://38.54.89.136}
      INVEST_SCHEDULER_DAILY_REPORT_ENABLED: ${INVEST_SCHEDULER_DAILY_REPORT_ENABLED:-false}
      INVEST_SCHEDULER_DAILY_REPORT_CRON: ${INVEST_SCHEDULER_DAILY_REPORT_CRON:-0 10 18 * * *}
      INVEST_SCHEDULER_DAILY_REPORT_ZONE: ${INVEST_SCHEDULER_DAILY_REPORT_ZONE:-Asia/Taipei}
      INVEST_SCHEDULER_ALERT_POLLING_ENABLED: ${INVEST_SCHEDULER_ALERT_POLLING_ENABLED:-false}
      INVEST_SCHEDULER_ALERT_POLLING_FIXED_DELAY_MS: ${INVEST_SCHEDULER_ALERT_POLLING_FIXED_DELAY_MS:-120000}
      INVEST_SCHEDULER_ALERT_POLLING_INITIAL_DELAY_MS: ${INVEST_SCHEDULER_ALERT_POLLING_INITIAL_DELAY_MS:-30000}
      INVEST_ALERT_ABNORMAL_DROP_THRESHOLD_PERCENT: ${INVEST_ALERT_ABNORMAL_DROP_THRESHOLD_PERCENT:-2.0}
      INVEST_ALERT_ABNORMAL_DROP_WINDOW_MINUTES: ${INVEST_ALERT_ABNORMAL_DROP_WINDOW_MINUTES:-10}
      INVEST_ALERT_ABNORMAL_DROP_COOLDOWN_MINUTES: ${INVEST_ALERT_ABNORMAL_DROP_COOLDOWN_MINUTES:-10}
      INVEST_SCHEDULER_PRICE_UPDATE_ENABLED: ${INVEST_SCHEDULER_PRICE_UPDATE_ENABLED:-false}
      INVEST_SCHEDULER_PRICE_UPDATE_TW_CRON: ${INVEST_SCHEDULER_PRICE_UPDATE_TW_CRON:-0 30 15 * * MON-FRI}
      INVEST_SCHEDULER_PRICE_UPDATE_TW_ZONE: ${INVEST_SCHEDULER_PRICE_UPDATE_TW_ZONE:-Asia/Taipei}
      INVEST_SCHEDULER_PRICE_UPDATE_US_CRON: ${INVEST_SCHEDULER_PRICE_UPDATE_US_CRON:-0 30 6 * * TUE-SAT}
      INVEST_SCHEDULER_PRICE_UPDATE_US_ZONE: ${INVEST_SCHEDULER_PRICE_UPDATE_US_ZONE:-Asia/Taipei}
      INVEST_PRICE_UPDATE_RETRY_MAX_ATTEMPTS: ${INVEST_PRICE_UPDATE_RETRY_MAX_ATTEMPTS:-2}
      INVEST_PRICE_UPDATE_RETRY_DELAY_MS: ${INVEST_PRICE_UPDATE_RETRY_DELAY_MS:-300}
      INVEST_PRICE_UPDATE_DATA_QUALITY_STALE_CALENDAR_DAYS: ${INVEST_PRICE_UPDATE_DATA_QUALITY_STALE_CALENDAR_DAYS:-3}
    restart: unless-stopped

  frontend-invest-admin:
    build:
      context: .
      dockerfile: ./frontend/invest-admin/Dockerfile
    container_name: frontend_invest_admin
    depends_on:
      - backend-invest
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx_invest
    ports:
      - "${INVEST_NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx-invest.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-invest-admin
      - backend-invest
    restart: unless-stopped

volumes:
  invest_mysql_data:
