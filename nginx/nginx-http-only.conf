events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 10M;
    client_body_buffer_size 128k;

    upstream frontend-personal {
        server frontend-personal:80;
    }

    upstream frontend-church {
        server frontend-church:80;
    }

    upstream frontend-church-admin {
        server frontend-church-admin:80;
    }

    upstream frontend-invest-admin {
        server frontend-invest-admin:80;
    }

    upstream backend-personal {
        server backend-personal:8080;
        keepalive 32;
    }

    upstream backend-church {
        server backend-church:8080;
        keepalive 32;
    }

    upstream backend-invest {
        server backend-invest:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost 127.0.0.1 power-light-church.duckdns.org 38.54.89.136;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 舊教會後台路徑相容
        location ~ ^/church/admin(/.*)?$ {
            return 301 /church-admin$1;
        }

        # 教會後台
        location /church-admin/ {
            proxy_pass http://frontend-church-admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "close";
            proxy_cache off;
            proxy_buffering off;
        }

        location = /church-admin {
            return 301 /church-admin/;
        }

        # Invest 後台
        location /invest-admin/ {
            proxy_pass http://frontend-invest-admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "close";
            proxy_cache off;
            proxy_buffering off;
        }

        location = /invest-admin {
            return 301 /invest-admin/;
        }

        # 教會前台
        location /church/ {
            proxy_pass http://frontend-church/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "close";
            proxy_cache off;
            proxy_buffering off;
        }

        location = /church {
            return 301 /church/;
        }

        # Personal 前台（重要：透過尾斜線 proxy_pass 去除 /personal 前綴）
        location /personal/ {
            proxy_pass http://frontend-personal/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "close";
            proxy_cache off;
            proxy_buffering off;
        }

        location = /personal {
            return 301 /personal/;
        }

        # 教會圖片
        location /uploads/church/ {
            alias /usr/share/nginx/html/uploads/church/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # API
        location ^~ /api/church/ {
            proxy_pass http://backend-church;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/invest/ {
            proxy_pass http://backend-invest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api {
            proxy_pass http://backend-personal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 根路徑不提供內容，避免誤導
        location = / {
            return 404;
        }
    }
}
