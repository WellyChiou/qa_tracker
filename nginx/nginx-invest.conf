events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 10M;

    upstream frontend-invest-admin {
        server frontend-invest-admin:80;
    }

    upstream backend-invest {
        server backend-invest:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        location /invest-admin/ {
            proxy_pass http://frontend-invest-admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        location = /invest-admin {
            return 301 /invest-admin/;
        }

        location ^~ /api/invest/ {
            proxy_pass http://backend-invest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = / {
            return 404;
        }
    }
}
